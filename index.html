<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Creator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container-wrapper {
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }
        .card {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 12px;
            background-color: #2d2d2d;
        }
        .card-header {
            background: #1a1a1a;
            border: none;
            border-radius: 12px 12px 0 0;
        }
        .card-body {
            background-color: #2d2d2d;
        }
        .btn-primary {
            background: #333333;
            border: 1px solid #555555;
            padding: 10px 30px;
            font-weight: 600;
            transition: transform 0.2s;
            color: #ffffff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            background: #444444;
            border: 1px solid #666666;
            color: #ffffff;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .response-section {
            margin-top: 20px;
            min-height: 100px;
            padding: 15px;
            background-color: #1a1a1a;
            border-radius: 8px;
            display: none;
            border: 1px solid #444444;
        }
        .response-section.show {
            display: block;
        }
        .spinner {
            display: none;
        }
        .spinner.show {
            display: inline-block;
        }
        .error-message {
            color: #dc3545;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .story-section {
            margin-top: 20px;
            padding: 15px;
            border-top: 1px solid #444444;
            display: none;
        }
        .story-section.show {
            display: block;
        }
        .story-section h5 {
            margin-bottom: 15px;
            color: #ffffff;
        }
        .story-content {
            line-height: 1.8;
            color: #e0e0e0;
            font-size: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #444444;
        }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <div class="card">
            <div class="card-header border-bottom border-secondary">
                <h2 class="card-title text-white mb-0">Story Creator</h2>
            </div>
            <div class="card-body">
                <form id="storyForm">
                    <div class="mb-3">
                        <label for="promptInput" class="form-label text-white">Enter a story prompt:</label>
                        <textarea 
                            class="form-control form-control-lg" 
                            id="promptInput" 
                            placeholder="e.g., A mysterious door appears in the forest"
                            required
                            rows="3"
                        ></textarea>
                    </div>
                    <button type="submit" class="btn btn-dark btn-lg w-100 text-white border-secondary">
                        <span class="spinner" id="spinner">
                            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                        </span>
                        Generate Story
                    </button>
                </form>

                <div class="response-section" id="responseSection">
                    <div class="error-message" id="errorMessage"></div>
                </div>

                <div class="story-section" id="storySection">
                    <h5>Your Story:</h5>
                    <div class="story-content" id="storyContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html></div>
